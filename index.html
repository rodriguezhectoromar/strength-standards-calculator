<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strength Standards Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #f0f0f8;
      --muted: #8888a8;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── Lift selector ── */
    .lift-selector {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .lift-btn {
      border: 1.5px solid var(--lift-color);
      border-radius: 99px;
      background: transparent;
      color: var(--lift-color);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.4em 1.05em;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }

    .lift-btn.active {
      background: var(--lift-color);
      color: #fff;
    }

    .lift-btn:not(.active):hover {
      background: color-mix(in srgb, var(--lift-color) 16%, transparent);
    }

    .lift-btn.dummy { opacity: 0.45; cursor: default; }
    .lift-btn.dummy:hover { background: transparent; }

    .lift-bench    { --lift-color: #ef4444; }
    .lift-squat    { --lift-color: #22c55e; }
    .lift-deadlift { --lift-color: #a855f7; }
    .lift-ohp      { --lift-color: #f97316; }
    .lift-row      { --lift-color: #3b82f6; }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(1.45rem, 4vw, 2.1rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.84rem;
      max-width: 42ch;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Input card ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem;
      width: 100%;
      max-width: 460px;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 0.55rem;
    }

    .input-row {
      display: flex;
      gap: 0.7rem;
    }

    input[type="number"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 600;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #6c63ff22;
    }

    .calc-btn {
      background: #38384e;
      border: 1px solid #48485e;
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0.65rem 1.25rem;
      transition: background 0.18s, transform 0.1s;
      white-space: nowrap;
    }

    .calc-btn:hover { background: #44445c; }
    .calc-btn:active { transform: scale(0.97); }

    .hint {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.72rem;
    }

    /* ── Results ── */
    .results {
      width: 100%;
      max-width: 620px;
      display: none;
      flex-direction: column;
      gap: 0.7rem;
      animation: fadeUp 0.35s ease both;
    }

    .results.visible { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }

    .results-title {
      font-size: 0.86rem;
      font-weight: 700;
      color: var(--text);
    }

    .results-subtitle {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ── Tier cards ── */
    .tier-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 0.85rem 1.1rem;
      gap: 0.85rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .tier-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      background: var(--tier-color, var(--accent));
    }

    .tier-card:hover {
      border-color: color-mix(in srgb, var(--tier-color) 40%, var(--border));
    }

    .tier-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.15rem;
    }

    .tier-desc {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .tier-value {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--tier-color, var(--text));
      text-align: right;
      white-space: nowrap;
    }

    .tier-unit {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--muted);
      text-align: right;
      letter-spacing: 0.05em;
    }

    .bar-wrap {
      grid-column: 1 / -1;
      background: var(--surface2);
      border-radius: 99px;
      height: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--tier-color, var(--accent));
      width: 0;
      transition: width 0.6s cubic-bezier(.22,1,.36,1);
    }

    .tier-untrained    { --tier-color: #94a3b8; }
    .tier-novice       { --tier-color: #34d399; }
    .tier-intermediate { --tier-color: #60a5fa; }
    .tier-int-adv      { --tier-color: #a78bfa; }
    .tier-advanced     { --tier-color: #fbbf24; }
    .tier-elite        { --tier-color: #f97316; }

    /* ── Footer ── */
    footer {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.68rem;
      text-align: center;
      line-height: 1.7;
      opacity: 0.38;
    }
  </style>
</head>
<body>

  <div class="lift-selector">
    <button class="lift-btn lift-bench active" data-lift="bench">Bench Press</button>
    <button class="lift-btn lift-squat dummy">Squat</button>
    <button class="lift-btn lift-deadlift dummy">Deadlift</button>
    <button class="lift-btn lift-ohp" data-lift="ohp">Overhead Press</button>
    <button class="lift-btn lift-row dummy">Bent Over Row</button>
  </div>

  <header>
    <h1>Strength Standards<br>Calculator</h1>
    <p class="subtitle">Enter your bodyweight to see the 1-rep max benchmarks across every training level.</p>
  </header>

  <div class="input-card">
    <label for="weight">Bodyweight</label>
    <div class="input-row">
      <input type="number" id="weight" min="50" max="500" step="1" />
      <button class="calc-btn" onclick="calculate()">Calculate</button>
    </div>
    <p class="hint">Enter weight in lbs</p>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <span class="results-title" id="results-title">1-Rep Max Standards</span>
      <span class="results-subtitle" id="results-for"></span>
    </div>
  </div>

  <footer>
    Standards based on logistic curve models fitted to population data.<br>
    Individual results may vary. Always train within your limits.
  </footer>

  <script>
    const TIERS_META = [
      { key: 'untrained',    label: 'Untrained',              desc: 'No training history',            cls: 'tier-untrained'    },
      { key: 'novice',       label: 'Novice',                 desc: '3–12 months of consistent training', cls: 'tier-novice'  },
      { key: 'intermediate', label: 'Intermediate',           desc: '1–3 years of consistent training',   cls: 'tier-intermediate' },
      { key: 'int-adv',      label: 'Intermediate–Advanced',  desc: '3–6 years of serious training',   cls: 'tier-int-adv'    },
      { key: 'advanced',     label: 'Advanced',               desc: '6+ years of dedicated training',  cls: 'tier-advanced'   },
      { key: 'elite',        label: 'Elite',                  desc: 'Competitive-level performance',   cls: 'tier-elite'      },
    ];

    const LIFTS = {
      bench: {
        label: 'Bench Press',
        fns: [
          w => 155.18 / (1 + Math.exp(-0.02039 * (w - 104.72))),
          w => 203.62 / (1 + Math.exp(-0.01957 * (w - 108.06))),
          w => 248.43 / (1 + Math.exp(-0.02    * (w - 109.13))),
          w => 293.46 / (1 + Math.exp(-0.01981 * (w - 108.15))),
          w => 338.49 / (1 + Math.exp(-0.01962 * (w - 107.16))),
          w => 418.95 / (1 + Math.exp(-0.02079 * (w - 108.79))),
        ],
      },
      ohp: {
        label: 'Overhead Press',
        fns: [
          w => 101.99 / (1 + Math.exp(-0.01696 * (w - 102.42))),
          w => 137.79 / (1 + Math.exp(-0.01679 * (w - 103.17))),
          w => 171.59 / (1 + Math.exp(-0.01976 * (w - 107.56))),
          w => 187.06 / (1 + Math.exp(-0.02005 * (w - 107.66))),
          w => 202.53 / (1 + Math.exp(-0.02034 * (w - 107.75))),
          w => 289.14 / (1 + Math.exp(-0.02024 * (w - 127.24))),
        ],
      },
    };

    let activeLift = 'bench';

    function mround(value, multiple) {
      return Math.round(value / multiple) * multiple;
    }

    function switchLift(liftKey) {
      if (liftKey === activeLift) return;
      activeLift = liftKey;

      document.querySelectorAll('.lift-btn[data-lift]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lift === liftKey);
      });

      // clear results when switching lifts
      const container = document.getElementById('results');
      container.querySelectorAll('.tier-card').forEach(c => c.remove());
      container.classList.remove('visible');
      document.getElementById('results-for').textContent = '';
    }

    function calculate() {
      const input = document.getElementById('weight');
      const w = parseFloat(input.value);

      if (!w || w < 50 || w > 500) {
        input.focus();
        input.style.borderColor = '#f87171';
        setTimeout(() => input.style.borderColor = '', 1200);
        return;
      }

      const lift = LIFTS[activeLift];
      const results = TIERS_META.map((meta, i) => ({
        ...meta,
        lbs: mround(lift.fns[i](w), 2.5),
      }));

      const maxLbs = results[results.length - 1].lbs;
      const container = document.getElementById('results');

      document.getElementById('results-title').textContent = `${lift.label} · 1-Rep Max Standards`;
      document.getElementById('results-for').textContent = `for ${w} lb bodyweight`;

      container.querySelectorAll('.tier-card').forEach(c => c.remove());

      results.forEach(r => {
        const pct = Math.round((r.lbs / maxLbs) * 100);
        const card = document.createElement('div');
        card.className = `tier-card ${r.cls}`;
        card.innerHTML = `
          <div>
            <div class="tier-name">${r.label}</div>
            <div class="tier-desc">${r.desc}</div>
          </div>
          <div>
            <div class="tier-value">${r.lbs}</div>
            <div class="tier-unit">LBS</div>
          </div>
          <div class="bar-wrap">
            <div class="bar-fill" data-pct="${pct}"></div>
          </div>
        `;
        container.appendChild(card);
      });

      container.classList.add('visible');

      requestAnimationFrame(() => requestAnimationFrame(() => {
        container.querySelectorAll('.bar-fill').forEach(bar => {
          bar.style.width = bar.dataset.pct + '%';
        });
      }));
    }

    document.querySelectorAll('.lift-btn[data-lift]').forEach(btn => {
      btn.addEventListener('click', () => switchLift(btn.dataset.lift));
    });

    document.getElementById('weight').addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });
  </script>

</body>
</html>
